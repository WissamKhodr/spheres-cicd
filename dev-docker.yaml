services:
  db:
    image: postgres:latest
    container_name: spheres-dev_db
    restart: always
    environment:
      POSTGRES_USER: spheres_dev
      POSTGRES_PASSWORD: spheres_dev_pass
      POSTGRES_DB: spheres_dev
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql
